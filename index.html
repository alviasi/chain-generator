<!DOCTYPE html>
<html>
<body>

<h2>10 Day Entry</h2>

<input id="d1" placeholder="Day1"><br>
<input id="d2" placeholder="Day2"><br>
<input id="d3" placeholder="Day3"><br>
<input id="d4" placeholder="Day4"><br>
<input id="d5" placeholder="Day5"><br>
<input id="d6" placeholder="Day6"><br>
<input id="d7" placeholder="Day7"><br>
<input id="d8" placeholder="Day8"><br>
<input id="d9" placeholder="Day9"><br>
<input id="d10" placeholder="Day10"><br><br>

<button onclick="pushUp()">Push Up</button>
<button onclick="generate()">Generate</button>

<h3 id="result"></h3>

<script>

function pushUp(){
d1.value=d2.value
d2.value=d3.value
d3.value=d4.value
d4.value=d5.value
d5.value=d6.value
d6.value=d7.value
d7.value=d8.value
d8.value=d9.value
d9.value=d10.value
d10.value=""
}

function generate(){
let a=d1.value
let b=d2.value

let diff=a-b
if(a<b){ diff=(a+10)-b }

let step2=100-diff
let step3=step2+Number(b)

let box1=step3
let box2=step3+19
let box3=step3+38
let box4=step3+57

result.innerHTML="Boxes: "+box1+" , "+box2+" , "+box3+" , "+box4
}

</script>

</body>
</html>
