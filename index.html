<!DOCTYPE html>
<html>
<head>
<title>Chain Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
}

input{
width:50px;
margin:4px;
padding:5px;
}

button{
padding:10px;
margin-top:10px;
}

.box{
border:2px solid black;
width:60px;
padding:10px;
margin:10px auto;
font-size:20px;
display:block;
}

</style>

</head>

<body>

<h2>10 Day Chain Generator</h2>

<div>

<input id="d1" placeholder="D1">
<input id="d2" placeholder="D2">
<input id="d3" placeholder="D3">
<input id="d4" placeholder="D4">
<input id="d5" placeholder="D5">
<input id="d6" placeholder="D6">
<input id="d7" placeholder="D7">
<input id="d8" placeholder="D8">
<input id="d9" placeholder="D9">
<input id="d10" placeholder="D10">

</div>

<br>

<button onclick="generate()">Generate Boxes</button>

<h3>Boxes</h3>

<div id="result"></div>

<script>

function last2(n){
return ("0"+n).slice(-2);
}

function generate(){

let a=parseInt(document.getElementById("d1").value);
let b=parseInt(document.getElementById("d2").value);

let diff;

if(a<b){
diff=(a+10)-b;
}else{
diff=a-b;
}

let step2=100-diff;

let base=step2+b;

let box1=last2(base+19);
let box2=last2((base+19)+19);
let box3=last2((base+38)+19);
let box4=last2((base+57)+19);

document.getElementById("result").innerHTML=

"<div class='box'>"+box1+"</div>"+
"<div class='box'>"+box2+"</div>"+
"<div class='box'>"+box3+"</div>"+
"<div class='box'>"+box4+"</div>";

}

</script>

</body>
</html>
