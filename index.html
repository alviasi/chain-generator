<!DOCTYPE html>
<html>

<head>

<title>Chain Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
}

input{
width:70px;
padding:8px;
margin:6px auto;
display:block;
text-align:center;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
margin-bottom:10px;
}

.box{
border:2px solid black;
width:70px;
padding:12px;
margin:8px auto;
font-size:20px;
display:block;
}

</style>

</head>

<body>

<h2>10 Day Chain Generator</h2>

<input id="d1" placeholder="Day1">
<input id="d2" placeholder="Day2">
<input id="d3" placeholder="Day3">
<input id="d4" placeholder="Day4">
<input id="d5" placeholder="Day5">
<input id="d6" placeholder="Day6">
<input id="d7" placeholder="Day7">
<input id="d8" placeholder="Day8">
<input id="d9" placeholder="Day9">
<input id="d10" placeholder="Day10">

<button onclick="shiftNumbers()">Shift Numbers</button>
<button onclick="shiftNumbers()">Shift Numbers</button>
<button onclick="generate()">Generate Boxes</button>

<h3>Boxes</h3>

<div id="result"></div>

<script>
function shiftNumbers(){

document.getElementById("d1").value=document.getElementById("d2").value;
document.getElementById("d2").value=document.getElementById("d3").value;
document.getElementById("d3").value=document.getElementById("d4").value;
document.getElementById("d4").value=document.getElementById("d5").value;
document.getElementById("d5").value=document.getElementById("d6").value;
document.getElementById("d6").value=document.getElementById("d7").value;
document.getElementById("d7").value=document.getElementById("d8").value;
document.getElementById("d8").value=document.getElementById("d9").value;
document.getElementById("d9").value=document.getElementById("d10").value;

document.getElementById("d10").value="";

}
function last2(n){
return ("0"+n).slice(-2);
}

function generate(){

let a=parseInt(document.getElementById("d1").value);
let b=parseInt(document.getElementById("d2").value);

let diff;

if(a<b){
diff=(a+10)-b;
}else{
diff=a-b;
}

let step2=100-diff;

let base=step2+b;

let box1=last2(base+19);
let box2=last2((base+19)+19);
let box3=last2((base+38)+19);
let box4=last2((base+57)+19);

document.getElementById("result").innerHTML=

"<div class='box'>"+box1+"</div>"+
"<div class='box'>"+box2+"</div>"+
"<div class='box'>"+box3+"</div>"+
"<div class='box'>"+box4+"</div>";

}

function shiftNumbers(){

document.getElementById("d1").value=document.getElementById("d2").value;
document.getElementById("d2").value=document.getElementById("d3").value;
document.getElementById("d3").value=document.getElementById("d4").value;
document.getElementById("d4").value=document.getElementById("d5").value;
document.getElementById("d5").value=document.getElementById("d6").value;
document.getElementById("d6").value=document.getElementById("d7").value;
document.getElementById("d7").value=document.getElementById("d8").value;
document.getElementById("d8").value=document.getElementById("d9").value;
document.getElementById("d9").value=document.getElementById("d10").value;

document.getElementById("d10").value="";

}

</script>

</body>

</html>
