<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10-Day Chain Generator</title>
<style>
body { font-family: Arial; text-align: center; padding: 10px; }
input { width: 70px; padding: 8px; margin: 6px auto; display: block; text-align: center; font-size: 16px; }
button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; }
.box { border: 2px solid black; width: 70px; padding: 12px; margin: 8px auto; font-size: 18px; display: block; }
</style>
</head>
<body>

<h2>10-Day Full Chain Generator</h2>

<input id="d1" placeholder="Day1">
<input id="d2" placeholder="Day2">
<input id="d3" placeholder="Day3">
<input id="d4" placeholder="Day4">
<input id="d5" placeholder="Day5">
<input id="d6" placeholder="Day6">
<input id="d7" placeholder="Day7">
<input id="d8" placeholder="Day8">
<input id="d9" placeholder="Day9">
<input id="d10" placeholder="Day10">

<button id="generateBtn">Generate Full Chain</button>
<button onclick="shiftNumbers()">Shift Numbers</button>
<h3>Boxes for each pair</h3>
<div id="allBoxes"></div>

<h3>Sequence Tracking</h3>
<div id="sequence"></div>

<h3>Predicted Day11 Box</h3>
<div id="day11" class="box"></div>

<script>
  function shiftNumbers(){

document.getElementById("d1").value=document.getElementById("d2").value;
document.getElementById("d2").value=document.getElementById("d3").value;
document.getElementById("d3").value=document.getElementById("d4").value;
document.getElementById("d4").value=document.getElementById("d5").value;
document.getElementById("d5").value=document.getElementById("d6").value;
document.getElementById("d6").value=document.getElementById("d7").value;
document.getElementById("d7").value=document.getElementById("d8").value;
document.getElementById("d8").value=document.getElementById("d9").value;
document.getElementById("d9").value=document.getElementById("d10").value;

document.getElementById("d10").value="";

}
(function(){

// Digit-wise mapping: 0↔5,1↔6,2↔7,3↔8,4↔9
const mapping = {'0':'5','1':'6','2':'7','3':'8','4':'9','5':'0','6':'1','7':'2','8':'3','9':'4'};

function mapBox(box){
    return box.split('').map(d=>mapping[d]).join('');
}
  

function generateBoxes(a,b){
    let diff = (a<b)? (a+10)-b : a-b;
    let base = 100 - diff + b;
    let boxes = [];
    for(let i=0;i<4;i++){
        boxes.push(String(base + 19*i).slice(-2));
    }
    return boxes;
}
function checkBoxMatch(box, dayNum){

    const mapping = {'0':'5','1':'6','2':'7','3':'8','4':'9','5':'0','6':'1','7':'2','8':'3','9':'4'};

    let d = String(dayNum);

    let d1 = d[0];                 // first digit
    let d2 = d.length>1 ? d[1] : null;   // second digit

    let boxDigits = box.split('');

    for(let digit of boxDigits){

        // direct match
        if(digit === d1 || digit === d2){
            return true;
        }

        // mapping match
        if(mapping[digit] === d1 || mapping[digit] === d2){
            return true;
        }
    }

    return false;
}


function generateChain(){
    let days = [];
    for(let i=1;i<=10;i++){
        let val = document.getElementById('d'+i).value.trim();
        if(val === '') { alert('Please enter all 10 numbers'); return; }
        let num = parseInt(val);
        if(isNaN(num)) { alert('Please enter valid numbers'); return; }
        days.push(num);
    }

  
    let allBoxesHTML = '';
    let sequenceHTML = '';
    let currentIndex = 0;

    for(let i=0;i<days.length-2;i++){
        let boxes = generateBoxes(days[i], days[i+1]);
        allBoxesHTML += `<strong>Day${i+1}-${i+2} Boxes:</strong><br>`;
        boxes.forEach(b=>{ allBoxesHTML += `<div class="box">${b}</div>`; });

        let foundIndex = -1;
        for(let j=0;j<boxes.length;j++){
            if(checkBoxMatch(boxes[j], days[i+2])){ foundIndex = j; break; }
        }

        sequenceHTML += `<strong>Day${i+3} in Day${i+1}-${i+2} Boxes:</strong> `;
        if(foundIndex>=0){ sequenceHTML += `Box${foundIndex+1}`; currentIndex=foundIndex; }
        else{ sequenceHTML += 'Not Found'; }
        sequenceHTML += '<br>';
    }

    document.getElementById('allBoxes').innerHTML = allBoxesHTML;
    document.getElementById('sequence').innerHTML = sequenceHTML;

    let lastBoxes = generateBoxes(days[8], days[9]);
    let predictedBox = lastBoxes[currentIndex>=0?currentIndex:0];
    document.getElementById('day11').innerText = predictedBox;
}

document.getElementById('generateBtn').addEventListener('click', generateChain);

})();
</script>
</body>
</html>
