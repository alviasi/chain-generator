<!DOCTYPE html>
<html>
<body>

<h2>10 Day Entry</h2>

<input id="d1" placeholder="Day1"><br>
<input id="d2" placeholder="Day2"><br>
<input id="d3" placeholder="Day3"><br>
<input id="d4" placeholder="Day4"><br>
<input id="d5" placeholder="Day5"><br>
<input id="d6" placeholder="Day6"><br>
<input id="d7" placeholder="Day7"><br>
<input id="d8" placeholder="Day8"><br>
<input id="d9" placeholder="Day9"><br>
<input id="d10" placeholder="Day10"><br><br>

<button onclick="shiftNumbers()">Push Up</button>
<button onclick="generate()">Generate</button>

<p id="result"></p>

<script>

function shiftNumbers(){
document.getElementById("d1").value = document.getElementById("d2").value
document.getElementById("d2").value = document.getElementById("d3").value
document.getElementById("d3").value = document.getElementById("d4").value
document.getElementById("d4").value = document.getElementById("d5").value
document.getElementById("d5").value = document.getElementById("d6").value
document.getElementById("d6").value = document.getElementById("d7").value
document.getElementById("d7").value = document.getElementById("d8").value
document.getElementById("d8").value = document.getElementById("d9").value
document.getElementById("d9").value = document.getElementById("d10").value
document.getElementById("d10").value = ""
}

function generate(){
let n1 = document.getElementById("d1").value
let n2 = document.getElementById("d2").value

document.getElementById("result").innerHTML =
"Day1: "+n1+" Day2: "+n2
}

</script>

</body>
</html>
