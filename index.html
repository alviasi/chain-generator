<!DOCTYPE html>
<html>
<head>
<title>Full Chain Generator</title>
<style>
body { font-family:Arial; text-align:center; }
input { width:70px; padding:8px; margin:6px auto; display:block; text-align:center; font-size:16px; }
button { padding:10px 20px; font-size:16px; margin:10px; cursor:pointer; }
.box { border:2px solid black; width:70px; padding:12px; margin:8px auto; font-size:18px; display:block; }
</style>
</head>
<body>

<h2>10-Day Full Chain Generator (Digit-wise Mapping)</h2>

<input id="d1" placeholder="Day1">
<input id="d2" placeholder="Day2">
<input id="d3" placeholder="Day3">
<input id="d4" placeholder="Day4">
<input id="d5" placeholder="Day5">
<input id="d6" placeholder="Day6">
<input id="d7" placeholder="Day7">
<input id="d8" placeholder="Day8">
<input id="d9" placeholder="Day9">
<input id="d10" placeholder="Day10">

<button id="generateBtn">Generate Full Chain</button>

<h3>Boxes for each pair</h3>
<div id="allBoxes"></div>

<h3>Sequence Tracking</h3>
<div id="sequence"></div>

<h3>Predicted Day11 Box</h3>
<div id="day11" class="box"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

function last2(n){ return ("0"+n).slice(-2); }

function generateBoxes(a,b){
    let diff = (a<b)? (a+10)-b : a-b;
    let step2 = 100 - diff;
    let base = step2 + b;
    let boxes = [];
    for(let i=0;i<4;i++){ boxes.push(last2(base + 19*i)); }
    return boxes;
}

function checkBoxMatch(box, dayNum){
    const mapping = {0:5,1:6,2:7,3:8,4:9,5:0,6:1,7:2,8:3,9:4};
    let digits = box.split("");
    let mappedDigits = digits.map(d=>mapping[d]?mapping[d]:d);
    return mappedDigits.includes(dayNum.toString());
}

function generateChain(){
    let days=[];
    for(let i=1;i<=10;i++){
        let val = parseInt(document.getElementById("d"+i).value);
        if(isNaN(val)) { alert("Please enter numbers for all 10 days."); return; }
        days.push(val);
    }

    let allBoxesHTML="", sequenceHTML="", currentIndex=0;

    for(let i=0;i<days.length-1;i++){
        let boxes = generateBoxes(days[i],days[i+1]);
        allBoxesHTML+="<strong>Day"+(i+1)+"-"+(i+2)+" Boxes:</strong><br>";
        boxes.forEach(b=>{ allBoxesHTML+="<div class='box'>"+b+"</div>"; });

        let foundIndex=-1;
        for(let j=0;j<boxes.length;j++){
            if(boxes[j]==last2(days[i+2]) || checkBoxMatch(boxes[j], days[i+2])) { foundIndex=j; break; }
        }

        sequenceHTML+="<strong>Day"+(i+2)+" in Day"+(i+1)+"-"+(i+2)+" Boxes:</strong> ";
        if(foundIndex>=0){ sequenceHTML+="Box"+(foundIndex+1); currentIndex=foundIndex; }
        else{ sequenceHTML+="Not Found"; }
        sequenceHTML+="<br>";
    }

    document.getElementById("allBoxes").innerHTML=allBoxesHTML;
    document.getElementById("sequence").innerHTML=sequenceHTML;

    let lastBoxes = generateBoxes(days[8],days[9]);
    let predictedBox = lastBoxes[currentIndex>=0?currentIndex:0];
    document.getElementById("day11").innerText = predictedBox;
}

// Attach click event after DOM load
document.getElementById("generateBtn").addEventListener("click", generateChain);

}); // end DOMContentLoaded
</script>

</body>
</html>
