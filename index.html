<!DOCTYPE html>
<html>
<head>
<title>Full Automatic Chain Generator</title>
<style>
body{
font-family:Arial;
text-align:center;
}
input{
width:70px;
padding:8px;
margin:6px auto;
display:block;
text-align:center;
font-size:16px;
}
button{
padding:10px 20px;
font-size:16px;
margin:10px;
}
.box{
border:2px solid black;
width:70px;
padding:12px;
margin:8px auto;
font-size:18px;
display:block;
}
.sequenceBox{
border:1px solid #444;
padding:5px;
margin:4px auto;
width:80px;
display:block;
}
</style>
</head>
<body>

<h2>10-Day Full Chain Generator</h2>

<input id="d1" placeholder="Day1">
<input id="d2" placeholder="Day2">
<input id="d3" placeholder="Day3">
<input id="d4" placeholder="Day4">
<input id="d5" placeholder="Day5">
<input id="d6" placeholder="Day6">
<input id="d7" placeholder="Day7">
<input id="d8" placeholder="Day8">
<input id="d9" placeholder="Day9">
<input id="d10" placeholder="Day10">

<button onclick="generateChain()">Generate Full Chain</button>

<h3>Boxes for each pair</h3>
<div id="allBoxes"></div>

<h3>Sequence Tracking</h3>
<div id="sequence"></div>

<h3>Predicted Day11 Box</h3>
<div id="day11" class="box"></div>

<script>

function last2(n){
return ("0"+n).slice(-2);
}

// Function to generate 4 boxes from two numbers
function generateBoxes(a,b){
let diff;
if(a<b){
diff=(a+10)-b;
}else{
diff=a-b;
}
let step2=100-diff;
let base=step2+b;

let boxes=[];
for(let i=0;i<4;i++){
boxes.push(last2(base + 19*i));
}
return boxes;
}

// Function to generate full chain
function generateChain(){
let days=[];
for(let i=1;i<=10;i++){
days.push(parseInt(document.getElementById("d"+i).value));
}

let allBoxesHTML="";
let sequenceHTML="";
let currentBoxes=[];
let currentIndex=0;

// Generate boxes and track sequence
for(let i=0;i<days.length-1;i++){
let boxes = generateBoxes(days[i],days[i+1]);
allBoxesHTML+="<strong>Day"+(i+1)+"-"+(i+2)+" Boxes:</strong><br>";
boxes.forEach(b=>{
allBoxesHTML+="<div class='box'>"+b+"</div>";
});

// Sequence tracking
if(i==0){
currentBoxes = boxes;
currentIndex=-1;
}

// Find Day(i+2) in boxes
let foundIndex = boxes.indexOf(last2(days[i+2]));
sequenceHTML+="<strong>Day"+(i+2)+" in Day"+(i+1)+"-"+(i+2)+" Boxes:</strong> ";
if(foundIndex>=0){
sequenceHTML+="Box"+(foundIndex+1);
currentIndex = foundIndex;
}else{
sequenceHTML+="Not Found";
}
sequenceHTML+="<br>";

}

document.getElementById("allBoxes").innerHTML=allBoxesHTML;
document.getElementById("sequence").innerHTML=sequenceHTML;

// Predict Day11 Box using last pair (Day9-Day10)
let lastBoxes = generateBoxes(days[8],days[9]);
let predictedBox = lastBoxes[currentIndex>=0?currentIndex:0];
document.getElementById("day11").innerText = predictedBox;

}

</script>

</body>
</html>
