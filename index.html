<!DOCTYPE html>
<html>
<body>

<h2>Test Button</h2>

<input id="n1" placeholder="Number">
<button onclick="test()">Generate</button>

<p id="result"></p>

<script>
function test(){
let x = document.getElementById("n1").value;
document.getElementById("result").innerHTML = "Number: " + x;
}
</script>

</body>
</html>
